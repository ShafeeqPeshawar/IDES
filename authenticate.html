<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – igniUp</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="light">
    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-card-header">
          <a href="index.html" class="auth-back" aria-label="Back">
            <svg class="auth-back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </a>
          <a href="authenticate.html#signup" class="auth-btn-create" id="linkSignUp">Create Account</a>
          <a href="authenticate.html" class="auth-btn-create" id="linkSignIn" style="display:none">Sign In</a>
        </div>

        <div id="viewSignIn">
          <h1 class="auth-title">Sign In</h1>
          <p class="auth-welcome">Welcome back 👋</p>

          <form class="auth-form" id="signInForm" action="#" method="post" autocomplete="on">
            <div class="auth-input-wrap">
              <span class="auth-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="email" name="email" class="auth-input" placeholder="you@example.com" required autocomplete="email" />
            </div>

            <div class="auth-input-wrap">
              <span class="auth-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="password" name="password" class="auth-input" placeholder="•••••••" required autocomplete="current-password" />
              <button type="button" class="auth-eye" id="togglePassword" aria-label="Toggle password visibility">
                <svg class="auth-eye-icon auth-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="auth-eye-icon auth-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>

            <div class="auth-forgot-row">
              <a href="#" class="auth-forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn">Sign In</button>
          </form>
        </div>

        <div id="viewSignUp" style="display:none">
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-welcome">Join igniUp and save your programs 👋</p>

          <form class="auth-form" id="signUpForm" action="#" method="post" autocomplete="on">
            <div class="auth-input-wrap">
              <span class="auth-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="signupName" name="name" class="auth-input" placeholder="Your name" required autocomplete="name" />
            </div>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="signupEmail" name="email" class="auth-input" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <div class="auth-input-wrap">
              <span class="auth-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="signupPassword" name="password" class="auth-input" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6" />
              <button type="button" class="auth-eye" id="toggleSignUpPassword" aria-label="Toggle password visibility">
                <svg class="auth-eye-icon auth-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="auth-eye-icon auth-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="auth-error" id="authError" style="display:none"></p>
            <button type="submit" class="auth-btn">Create Account</button>
          </form>
        </div>

        <p class="auth-divider" id="dividerOr">or</p>
        <button type="button" class="auth-btn auth-btn-google">
          <svg class="auth-google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with google
        </button>
      </div>
    </main>

    <footer class="auth-page-footer">
      <button type="button" class="auth-theme-btn" id="themeBtn" title="Toggle dark/light mode" aria-label="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
    </footer>

    <script src="js/api.js"></script>
    <script>
      (function () {
        if (typeof window.isLoggedIn === "function" && window.isLoggedIn()) {
          window.location.href = "index.html";
          return;
        }
        var body = document.body;
        var themeBtn = document.getElementById("themeBtn");
        var themeIcon = document.getElementById("themeIcon");
        var saved = localStorage.getItem("theme");
        if (saved === "dark") {
          body.classList.remove("light");
          body.classList.add("dark");
          themeIcon.textContent = "☀️";
        } else {
          body.classList.remove("dark");
          body.classList.add("light");
          themeIcon.textContent = "🌙";
        }
        themeBtn.addEventListener("click", function () {
          if (body.classList.contains("light")) {
            body.classList.remove("light");
            body.classList.add("dark");
            themeIcon.textContent = "☀️";
            localStorage.setItem("theme", "dark");
          } else {
            body.classList.remove("dark");
            body.classList.add("light");
            themeIcon.textContent = "🌙";
            localStorage.setItem("theme", "light");
          }
        });

        function showView(isSignUp) {
          var viewIn = document.getElementById("viewSignIn");
          var viewUp = document.getElementById("viewSignUp");
          var linkUp = document.getElementById("linkSignUp");
          var linkIn = document.getElementById("linkSignIn");
          var divider = document.getElementById("dividerOr");
          if (isSignUp) {
            if (viewIn) viewIn.style.display = "none";
            if (viewUp) viewUp.style.display = "block";
            if (linkUp) linkUp.style.display = "none";
            if (linkIn) linkIn.style.display = "inline-block";
          } else {
            if (viewIn) viewIn.style.display = "block";
            if (viewUp) viewUp.style.display = "none";
            if (linkUp) linkUp.style.display = "inline-block";
            if (linkIn) linkIn.style.display = "none";
          }
        }
        if (window.location.hash === "#signup") showView(true);
        window.addEventListener("hashchange", function () {
          showView(window.location.hash === "#signup");
        });

        function showAuthError(msg) {
          var el = document.getElementById("authError");
          if (el) {
            el.textContent = msg || "";
            el.style.display = msg ? "block" : "none";
          }
        }

        document.getElementById("signInForm").addEventListener("submit", function (e) {
          e.preventDefault();
          var email = document.getElementById("email").value.trim();
          var password = document.getElementById("password").value;
          var btn = this.querySelector('button[type="submit"]');
          btn.disabled = true;
          fetch((window.API_BASE || "") + "/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password }),
          })
            .then(function (r) {
              return r.json().then(function (data) {
                if (!r.ok) throw new Error(data.error || "Login failed");
                return data;
              });
            })
            .then(function (data) {
              if (window.setStoredUser) window.setStoredUser(data.user, data.token);
              var returnTo = (window.location.search && new URLSearchParams(window.location.search).get("return")) || "";
              if (returnTo === "ide") window.location.href = "New-Python-IDE.html";
              else if (returnTo === "profile") window.location.href = "profile.html";
              else window.location.href = "index.html";
            })
            .catch(function (err) {
              var msg = err.message;
              if (msg === "Failed to fetch" || err.name === "TypeError") {
                msg = "Cannot reach server. Start the backend: in the 'server' folder run: npm install then npm start (and ensure MongoDB is running).";
              }
              showAuthError(msg);
              btn.disabled = false;
            });
        });

        document.getElementById("signUpForm").addEventListener("submit", function (e) {
          e.preventDefault();
          showAuthError("");
          var name = document.getElementById("signupName").value.trim();
          var email = document.getElementById("signupEmail").value.trim();
          var password = document.getElementById("signupPassword").value;
          if (password.length < 6) {
            showAuthError("Password must be at least 6 characters");
            return;
          }
          var btn = this.querySelector('button[type="submit"]');
          btn.disabled = true;
          fetch((window.API_BASE || "") + "/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name, email: email, password: password }),
          })
            .then(function (r) {
              return r.json().then(function (data) {
                if (!r.ok) throw new Error(data.error || "Registration failed");
                return data;
              });
            })
            .then(function (data) {
              if (window.setStoredUser) window.setStoredUser(data.user, data.token);
              var returnTo = (window.location.search && new URLSearchParams(window.location.search).get("return")) || "";
              if (returnTo === "ide") window.location.href = "New-Python-IDE.html";
              else if (returnTo === "profile") window.location.href = "profile.html";
              else window.location.href = "index.html";
            })
            .catch(function (err) {
              var msg = err.message;
              if (msg === "Failed to fetch" || err.name === "TypeError") {
                msg = "Cannot reach server. Start the backend: in the 'server' folder run: npm install then npm start (and ensure MongoDB is running).";
              }
              showAuthError(msg);
              btn.disabled = false;
            });
        });

        function togglePw(btnId, inputId) {
          var btn = document.getElementById(btnId);
          var inp = document.getElementById(inputId);
          if (!btn || !inp) return;
          var closed = btn.querySelector(".auth-eye-closed");
          var open = btn.querySelector(".auth-eye-open");
          btn.addEventListener("click", function () {
            if (inp.type === "password") {
              inp.type = "text";
              if (closed) closed.style.display = "none";
              if (open) open.style.display = "block";
            } else {
              inp.type = "password";
              if (closed) closed.style.display = "block";
              if (open) open.style.display = "none";
            }
          });
        }
        togglePw("togglePassword", "password");
        togglePw("toggleSignUpPassword", "signupPassword");
      })();
    </script>
  </body>
</html>
