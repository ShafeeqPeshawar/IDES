<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL practice – igniUp</title>
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="light sql-ide-page">
    <script>
      var __t = localStorage.getItem("theme");
      document.body.className = (__t === "dark" ? "dark" : "light") + " sql-ide-page";
    </script>
    <div class="top-bar-wrap">
      <div class="top-bar">
        <div class="top-bar-left">
          <a href="index.html" class="top-bar-brand" id="ideTopBarBrand">igniUp</a>
          <span class="top-bar-badge" id="ideCurrentBadge" style="display: none">
            <span class="top-bar-badge-icon" id="ideBadgeIcon"></span>
            <span class="top-bar-badge-name" id="ideBadgeName"></span>
          </span>
          <a href="#" class="top-bar-logout" id="ideLogout" style="display: none">Logout</a>
        </div>
        <div class="top-bar-actions">
          <button type="button" class="btn btn-load" onclick="sqlLoadScriptFile()">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Open script
          </button>
          <button type="button" class="btn btn-save" onclick="sqlSaveScriptFile()">
            <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save script
          </button>
        </div>
      </div>
    </div>
    <div class="main-container">
      <div class="side-panel">
        <div class="side-btn-container">
          <button type="button" class="side-btn" onclick="sqlGoHome()">
            <svg class="side-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </button>
          <span class="side-btn-label">Home</span>
        </div>
        <div class="side-btn-container" id="ideProfileBtnWrap" style="display: none">
          <a href="profile.html" class="side-btn side-btn-profile" id="ideProfileBtn" title="Profile">
            <svg class="side-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </a>
          <span class="side-btn-label">Profile</span>
        </div>
        <div class="side-btn-container">
          <button type="button" class="side-btn" onclick="sqlCopyEditor()">
            <svg class="side-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <span class="side-btn-label">Copy</span>
        </div>
        <div class="side-btn-container">
          <button type="button" class="side-btn" onclick="sqlPasteEditor()">
            <svg class="side-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          </button>
          <span class="side-btn-label">Paste</span>
        </div>
        <div class="side-btn-container">
          <button type="button" class="side-btn" onclick="sqlResetDatabase()" title="Run sql/employees-init.sql: Employees (100 rows) + Sales (1,000 rows) + views SalesView &amp; SalesReport; other tables kept">
            <svg class="side-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
          <span class="side-btn-label">Initialize</span>
        </div>
        <div class="side-btn-container" style="margin-top: auto">
          <button type="button" class="theme-toggle" onclick="sqlToggleTheme()" id="themeBtn">
            <svg class="side-btn-svg icon-moon" id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="side-btn-svg icon-sun" id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <span class="side-btn-label" id="themeLabel">Dark</span>
        </div>
      </div>
      <aside class="sql-explorer-panel" aria-label="Database objects">
        <div class="sql-explorer-section" id="sqlSecTables">
          <button
            type="button"
            class="sql-explorer-head"
            aria-expanded="true"
            onclick="sqlToggleExplorerSection('sqlSecTables')"
          >
            <span>Tables</span>
            <span class="sql-explorer-chevron" aria-hidden="true">▼</span>
          </button>
          <ul class="sql-explorer-list" id="sqlExplorerTables"></ul>
        </div>
        <div class="sql-explorer-section" id="sqlSecViews">
          <button
            type="button"
            class="sql-explorer-head"
            aria-expanded="true"
            onclick="sqlToggleExplorerSection('sqlSecViews')"
          >
            <span>Views</span>
            <span class="sql-explorer-chevron" aria-hidden="true">▼</span>
          </button>
          <ul class="sql-explorer-list" id="sqlExplorerViews"></ul>
        </div>
      </aside>
      <div class="sql-ide-stack" id="sqlIdeStack">
        <div class="editor-section" id="sqlEditorSection">
          <div class="section-header sql-editor-section-header">
            <span class="editor-title">
              <span class="editor-title-icon" aria-hidden="true">
                <span class="sql-logo-badge" title="SQLite (standard SQL)">SQL</span>
              </span>
              <strong>SQL</strong>
            </span>
            <div class="header-buttons sql-editor-actions">
              <button type="button" class="btn sql-btn-clear" onclick="sqlClearEditor()">
                <svg class="btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.24 3.56l4.95 4.94a2 2 0 0 1 0 2.83l-9.9 9.9a2 2 0 0 1-2.83 0L3.32 14.1a2 2 0 0 1 0-2.83l4.95-4.94 7.97 8.24 7.97-8.24z"/><path d="M2 12l5-5 10 10-5 5"/></svg>
                Clear
              </button>
              <button type="button" class="btn sql-btn-execute" onclick="sqlRun()" id="sqlRunBtn">
                <svg class="btn-svg" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Execute
              </button>
            </div>
          </div>
          <div class="editor-wrapper sql-editor-wrapper">
            <div class="line-numbers" id="lineNumbers"></div>
            <textarea
              id="editor"
              wrap="off"
              spellcheck="false"
              placeholder="Write your script here......."
            ></textarea>
            <div class="sql-editor-zoom-overlay" role="toolbar" aria-label="Editor font size">
              <button type="button" class="zoom-btn sql-zoom-fab" onclick="sqlZoomEditor(-1)" title="Zoom out" aria-label="Zoom out">
                <svg class="zoom-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
              <button type="button" class="zoom-btn sql-zoom-fab" onclick="sqlZoomEditor(1)" title="Zoom in" aria-label="Zoom in">
                <svg class="zoom-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div
          class="sql-stack-resizer"
          id="sqlStackResizer"
          role="separator"
          tabindex="0"
          aria-orientation="horizontal"
          aria-valuemin="110"
          aria-valuemax="800"
          aria-valuenow="168"
          aria-label="Drag to resize SQL editor and results"
        ></div>
        <div class="output-section sql-output-section" role="region" aria-label="Query results">
          <div class="sql-results-wrapper">
            <div id="sqlResults"><div class="sql-results-empty">No data available.</div></div>
            <div class="sql-results-zoom-overlay" role="toolbar" aria-label="Results font size">
              <button type="button" class="zoom-btn sql-zoom-fab" onclick="sqlZoomResults(-1)" title="Zoom out" aria-label="Zoom out">
                <svg class="zoom-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
              <button type="button" class="zoom-btn sql-zoom-fab" onclick="sqlZoomResults(1)" title="Zoom in" aria-label="Zoom in">
                <svg class="zoom-btn-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="sql-app.js"></script>
  </body>
</html>
